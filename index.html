<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINA BABY</title>

<style>

/* Danh sách bài viết sẽ được JavaScript tạo tự động */

.related{
width:90%;
max-width:1100px;
margin:60px auto 30px;
background:#eef2f5;
padding:30px;
border-radius:12px;
}

.related h2{
margin-bottom:20px;
color:#222;
border-left:5px solid #ff5ea8;
padding-left:12px;
}

.related-item h3{
margin-bottom:10px;
}

.related-item p{
color:#777;
}

.comments{
width:90%;
max-width:1100px;
margin:40px auto;
background:#fff;
padding:35px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.comments h2{
margin-bottom:30px;
text-align:center;
}

.comment{
display:flex;
gap:18px;
padding:25px 0;
border-bottom:1px solid #eee;
}

.comment:last-child{
border-bottom:none;
}

.comment img{
width:50px;
height:50px;
border-radius:50%;
}

.comment h4{
margin-bottom:5px;
}

.comment small{
display:block;
color:#888;
margin-bottom:10px;
}

.comment p{
line-height:1.7;
}  
  
/* not */  
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f5f5f5;
color:#333;
}

header{
position:sticky;
top:0;
background:#ff5ea8;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
z-index:999;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.logo{
font-size:28px;
font-weight:bold;
color:white;
}

nav a{
text-decoration:none;
color:white;
margin-left:25px;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#ffe600;
}

.banner{
background:linear-gradient(45deg,#ff5ea8,#ff88c4);
padding:70px 20px;
text-align:center;
color:white;
}

.banner h1{
font-size:45px;
margin-bottom:15px;
}

.banner p{
font-size:20px;
}

.container{
width:90%;
max-width:1100px;
margin:40px auto;
}

.card{

background:white;

margin-bottom:35px;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 15px rgba(0,0,0,.15);

transition:.3s;

}

.card:hover{

transform:translateY(-5px);

}

.card img.main{

width:100%;

display:block;

}

.content{

padding:25px;

}

.content h2{

margin-bottom:15px;

color:#ff3d93;

}

.content p{

line-height:1.8;

margin-bottom:20px;

}

.youtube{

position:relative;

cursor:pointer;

}

.youtube img{

width:100%;

border-radius:12px;

}

.thumb{

position:relative;

cursor:pointer;

}

.thumb img{

width:100%;

display:block;

border-radius:12px;

}

.youtube iframe{

width:100%;

height:500px;

border:none;

border-radius:12px;

}  

.play{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

font-size:70px;

color:white;

text-shadow:0 0 20px black;

}

footer{

background:#ff5ea8;

color:white;

padding:25px;

text-align:center;

margin-top:50px;

}

@media(max-width:768px){

header{

flex-direction:column;

}

nav{

margin-top:15px;

}

nav a{

display:inline-block;

margin:8px;

}

.banner h1{

font-size:32px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">
MINA BABY
</div>

<nav>

<a href="#">Mẹ & Bé</a>

<a href="#">Mẹ đẹp</a>

<a href="#">Cẩm nang</a>

<a href="#">Video</a>

</nav>

</header>

<div class="banner">

<h1>Cẩm Nang Mẹ & Bé</h1>

<p>Chia sẻ kiến thức - Video - Hình ảnh</p>

</div>

<div class="container" id="posts">

</div>

<!-- Danh sách bài viết sẽ được JavaScript tạo tự động -->

<section class="related">

<h2>Bài Viết Liên Quan</h2>

<div class="related-item">
<h3>Tài Liệu Phần Mềm Kiến Trúc Autocad</h3>
<p>Tháng 5 10, 2019</p>
</div>

</section>

<!-- Danh sách bài viết sẽ được JavaScript tạo tự động -->  
  
<section class="comments">

<h2>Bình luận</h2>

<div id="disqus_thread"></div>

<script>
var disqus_config = function () {
    this.page.url = window.location.href;
    this.page.identifier = window.location.pathname;
    this.page.title = document.title;
};

(function () {
    var d = document, s = d.createElement('script');
    s.src = 'https://mina-baby.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
})();
</script>

<noscript>
Please enable JavaScript to view the comments.
</noscript>

</section>
  
<!-- Danh sách bài viết sẽ được JavaScript tạo tự động -->
  
<footer>

© 2026 MINA BABY

</footer>

<script>

const posts=[

{

title:"Định dạng cấu hình chuẩn trong JWCAD",
  
image:"images/a1.webp",

text:`Đây là nội dung bài viết.
Bạn có thể thay đổi thoải mái, viết dài bao nhiêu cũng được.`,    

youtube:"2P_HKJqGONw"

},

{

title:"Zoom trong JWCAD",
  
image:"images/a2.webp",

text:`Có những ngày, mọi thứ dường như quá áp lực.
Nhưng đừng quên, nghỉ một chút không có nghĩa là bỏ cuộc.

Hãy cho bản thân thời gian để lấy lại năng lượng, rồi tiếp tục bước về phía trước. Mỗi bước đi, dù chậm, vẫn đưa bạn đến gần ước mơ hơn.

✨ Tin vào chính mình. Điều tốt đẹp luôn chờ đợi những người không ngừng cố gắng.

#TruyenCamHung
#SongTichCuc
#DongLucMoiNgay
#KhongBoCuoc
#PhatTrienBanThan`,  

youtube:"2P_HKJqGONw"

},

{

title:"Print trong JWCAD",

image:"images/a3.webp",

text:`🌍 The InterLink ecosystem continues to expand.

Secure infrastructure and growing business adoption are creating a brighter future for blockchain-powered enterprises.

#InterLink #ITLG #ITL 🚀`,    

youtube:"eOsS1rFILc8"

}

];

const container=document.getElementById("posts");

posts.forEach(post=>{

container.innerHTML+=`

<div class="card">

<div class="content">

<h2>${post.title}</h2>

<p>${post.text}</p>

</div>

<img class="main"
src="${post.image}"
loading="lazy">

<div class="content">

<div class="youtube" id="video${post.youtube}">

<div class="thumb"
onclick="playVideo('${post.youtube}')">

<img
src="https://img.youtube.com/vi/${post.youtube}/hqdefault.jpg"
loading="lazy">

<div class="play">▶</div>

</div>

</div>

</div>

</div>

`;

});

function playVideo(id){

document.getElementById("video"+id).innerHTML=`

<iframe
width="100%"
height="500"
src="https://www.youtube.com/embed/${id}?autoplay=1"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

`;

}
  
</script>

</body>
</html>
